server:
  port: 8080

spring:
  application:
    name: jira-story-analyzer

  datasource:
    url: jdbc:postgresql://localhost:5432/jira_analyzer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

jira:
  base-url: ${JIRA_BASE_URL:https://your-domain.atlassian.net}
  email: ${JIRA_EMAIL:your-email@example.com}
  api-token: ${JIRA_API_TOKEN:}

logging:
  level:
    com.jiranalyzer: DEBUG
    org.springframework.ai: DEBUG
