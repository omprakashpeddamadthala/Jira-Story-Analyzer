spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  ai:
    openai:
      api-key: test-key
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

ai:
  provider: openai
  openai:
    api-key: test-openai-key
    model: gpt-4o
    temperature: 0.7
  gemini:
    api-key: test-gemini-key
    model: gemini-2.0-flash
    temperature: 0.7

jira:
  base-url: https://test.atlassian.net
  email: test@example.com
  api-token: test-token
